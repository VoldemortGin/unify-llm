name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.13"

    - name: Sync dependencies
      run: uv sync

    # GitHub Actions 自动设置 CI=true → beartype 走 On 全量策略。
    - name: Gate (ruff + mypy + pytest)
      run: make check
